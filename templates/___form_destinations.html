<form mix-post="/api-create-destination" autocomplete="off">
    <div>
        <label for="destination_title">Title</label>
        <input name="destination_title" type="text" id="destination_title" placeholder="Title"
               mix-validate="{{ x.REGEX_DESTINATION_TITLE }}">
    </div>

    <div>
        <label for="destination_country">Country</label>
        <input name="destination_country" type="text" id="destination_country" placeholder="Country"
               mix-validate="{{ x.REGEX_DESTINATION_COUNTRY }}">
    </div>

    <div>
        <label for="destination_location">Location</label>
        <input name="destination_location" type="text" id="destination_location" placeholder="Location"
               mix-validate="{{ x.REGEX_DESTINATION_LOCATION }}">
    </div>

    <div>
        <label for="start_date">Start date</label>
        <input name="start_date" type="date" id="start_date">
    </div>

    <div>
        <label for="end_date">End date</label>
        <input name="end_date" type="date" id="end_date">
    </div>

    <button>Create Destination</button>
</form>
